<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIFT — Raid DB Viewer</title>
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #22263a;
    --border:   #2e3450;
    --accent:   #6c8cff;
    --accent2:  #ff7eb3;
    --gold:     #ffd166;
    --green:    #06d6a0;
    --red:      #ef476f;
    --text:     #dde3f0;
    --muted:    #7a8299;
    --font:     'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #12152b 0%, #1a1d27 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  header h1 { font-size: 20px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
  header .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  header .badge { background: var(--accent); color: #fff; border-radius: 20px;
                  padding: 2px 10px; font-size: 11px; font-weight: 600;
                  position: absolute; right: 28px; top: 50%; transform: translateY(-50%); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border);
          background: var(--surface); padding: 0 20px; }
  .tab-btn {
    padding: 12px 20px; cursor: pointer; color: var(--muted);
    font-weight: 600; font-size: 13px; border: none; background: none;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: color .2s, border-color .2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Layout ── */
  .tab-panel { display: none; padding: 24px 28px; }
  .tab-panel.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; margin-bottom: 16px;
  }
  .card-header {
    padding: 12px 16px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-header h3 { font-size: 13px; font-weight: 700; color: var(--gold); }
  .card-body { padding: 16px; }

  /* ── Tables ── */
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 8px 12px; font-size: 11px;
    font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    color: var(--muted); border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td { padding: 8px 12px; border-bottom: 1px solid rgba(46,52,80,.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(108,140,255,.05); }

  /* ── Rank badges ── */
  .rank-1 { color: var(--gold); font-weight: 800; }
  .rank-2 { color: #c0c0c0; font-weight: 700; }
  .rank-3 { color: #cd7f32; font-weight: 700; }

  /* ── DPS bar ── */
  .dps-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .dps-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .dps-bar    { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s; }
  .dps-val    { min-width: 80px; text-align: right; font-weight: 600; font-size: 13px; }

  /* ── Search / filters ── */
  .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  input[type=text], select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 7px 12px; border-radius: 6px; font-size: 13px;
    outline: none;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  input[type=text] { min-width: 200px; }

  /* ── Tags ── */
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
  }
  .tag-raid  { background: rgba(108,140,255,.2); color: var(--accent); }
  .tag-boss  { background: rgba(255,126,179,.15); color: var(--accent2); }
  .tag-class { background: rgba(6,214,160,.15);  color: var(--green); }

  /* ── Duration ── */
  .dur { color: var(--muted); font-size: 12px; }

  /* ── Grid 2 cols ── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }

  /* ── Stats row ── */
  .stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 20px; text-align: center; min-width: 110px;
  }
  .stat-box .val { font-size: 26px; font-weight: 800; color: var(--accent); }
  .stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; }

  /* ── Section title ── */
  .section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin: 20px 0 10px;
  }

  /* ── Raid detail accordion ── */
  details { margin-bottom: 8px; }
  summary {
    cursor: pointer; padding: 10px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; list-style: none;
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 13px;
  }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: '▶'; font-size: 10px; color: var(--muted); transition: transform .2s; }
  details[open] summary::before { transform: rotate(90deg); }
  details[open] summary { border-radius: 8px 8px 0 0; }
  .detail-body { border: 1px solid var(--border); border-top: none;
                 border-radius: 0 0 8px 8px; overflow: hidden; }

  /* ── Progress bar for raids ── */
  .progress-wrap { background: var(--border); border-radius: 4px; height: 4px; margin-top: 4px; }
  .progress-bar  { height: 100%; background: var(--green); border-radius: 4px; }

  /* ── No data ── */
  .empty { text-align: center; color: var(--muted); padding: 40px; font-style: italic; }

  /* ── Scrollable ── */
  .scroll-x { overflow-x: auto; }

  /* ── Leaderboard table ── */
  .lb-table { border-collapse: collapse; table-layout: fixed; width: auto; }
  .lb-table td, .lb-table th { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-col-rank { width: 28px;  text-align: right; }
  .lb-col-date { width: 68px; }
  .lb-col-name { width: 140px; }
  .lb-col-dps  { width: 80px;  text-align: right; font-variant-numeric: tabular-nums; font-family: 'Consolas','Courier New',monospace; }
  .lb-col-dur  { width: 36px;  text-align: right; }
</style>
</head>

// ── Helpers ───────────────────────────────────────────────────────────────
function fmtNum(v)  { return Math.round(v).toLocaleString('en-US'); }
function fmtDps(v)  { return v >= 1e6 ? (v/1e6).toFixed(2)+'M' : fmtNum(v); }
function fmtDmg(v)  { return v >= 1e9 ? (v/1e9).toFixed(2)+'G' : v >= 1e6 ? (v/1e6).toFixed(1)+'M' : fmtNum(v); }
function fmtDur(s)  { const m=Math.floor(s/60), sec=Math.round(s%60); return `${m}:${String(sec).padStart(2,'0')}`; }
function rankCls(r) { return r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':''; }

function tag(txt, cls) { return `<span class="tag ${cls}">${txt}</span>`; }

function dpsBar(val, maxVal) {
  const pct = maxVal > 0 ? Math.round(val/maxVal*100) : 0;
  return `<div class="dps-bar-wrap">
    <div class="dps-bar-bg"><div class="dps-bar" style="width:${pct}%"></div></div>
    <div class="dps-val">${fmtDps(val)}</div>
  </div>`;
}

// ── Couleurs par classe (Overview + Leaderboard) ────────────────────────────
const CLASS_ORDER  = ['Rogue','Cleric','Warrior','Primalist','Mage'];
const CLASS_COLORS = {
  'Rogue'    : '#e8b84b',   // jaune
  'Warrior'  : '#e05c5c',   // rouge
  'Mage'     : '#b07ce8',   // violet
  'Cleric'   : '#3ecf6e',   // vert
  'Primalist': '#22d3ee',   // cyan
};
function classColor(cls) { return CLASS_COLORS[cls] || 'var(--accent)'; }

// Boss kills indexed by id
const BK_BY_ID = {};
DATA.boss_kills.forEach(bk => BK_BY_ID[bk.id] = bk);

// DPS records indexed by boss_kill_id
const DR_BY_BK = {};
DATA.dps_records.forEach(dr => {
  if (!DR_BY_BK[dr.boss_kill_id]) DR_BY_BK[dr.boss_kill_id] = [];
  DR_BY_BK[dr.boss_kill_id].push(dr);
});

// Raids indexed
const RAIDS_BY_ID = {};
DATA.raids.forEach(r => RAIDS_BY_ID[r.id] = r);

// ── Tab navigation ─────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const names = ['overview','raids','leaderboard','players'];
    b.classList.toggle('active', names[i]===name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ── Overview ──────────────────────────────────────────────────────────────

// Correspondance boss_id → raid
const BOSS_TO_RAID = {};
Object.entries(DATA.raid_boss_structure || {}).forEach(([raid, bosses]) => {
  bosses.forEach(b => { BOSS_TO_RAID[b.id] = raid; });
});

// Liste ordonnée des raids disponibles
const OV_RAIDS = Object.keys(DATA.raid_boss_structure || {});
let ovCurrentRaid = OV_RAIDS[0] || null;

function fmtDur(s) {
  const m = Math.floor(s / 60), sec = Math.round(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtHps(v) { return v >= 1e6 ? (v/1e6).toFixed(2)+'M' : fmtNum(v); }

function buildOverview() {
  const el = document.getElementById('tab-overview');

  // ── Boutons raid ──
  let raidBtns = `<div id="ov-raid-tabs" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">`;
  OV_RAIDS.forEach((raid, i) => {
    raidBtns += `<button onclick="selectOvRaid('${raid}')" id="ov-raid-btn-${raid}"
      style="border:none;padding:7px 22px;border-radius:5px;font-weight:700;font-size:13px;
             cursor:pointer;letter-spacing:.5px;transition:background .15s,color .15s">
      ${raid}
    </button>`;
  });
  raidBtns += `</div><div id="ov-content"></div>`;

  el.innerHTML = raidBtns;
  if (ovCurrentRaid) selectOvRaid(ovCurrentRaid);
}

function selectOvRaid(raid) {
  ovCurrentRaid = raid;
  OV_RAIDS.forEach(r => {
    const btn = document.getElementById(`ov-raid-btn-${r}`);
    if (!btn) return;
    btn.style.background = r === raid ? 'var(--accent)' : 'var(--surface2)';
    btn.style.color      = r === raid ? '#111'          : 'var(--muted)';
  });
  renderOverview(raid);
}

function renderOverview(raid) {
  const el = document.getElementById('ov-content');
  if (!el) return;

  // Boss IDs appartenant à ce raid
  const raidBosses = (DATA.raid_boss_structure[raid] || []).map(b => b.id);
  if (!raidBosses.length) {
    el.innerHTML = `<div class="empty">No data for this raid.</div>`;
    return;
  }

  let html = '';

  // ── Helper : tableau horizontal multi-boss ──
  // cols = [{key, label}], getter(entry) → string
  function ovTable(sectionData, cols, title, icon, limit) {
    const bossList = raidBosses.filter(bid => sectionData[bid] && sectionData[bid].entries.length > 0);
    if (!bossList.length) return '';

    // Calcule les médianes par boss
    function median(arr) {
      if (!arr.length) return 0;
      const s = arr.slice().sort((a,b)=>a-b);
      const m = Math.floor(s.length/2);
      return s.length%2 ? s[m] : Math.round((s[m-1]+s[m])/2);
    }

    let t = `<div class="section-title">${icon} ${title}</div>
    <div class="scroll-x"><table style="table-layout:fixed;width:auto;border-collapse:collapse">
    <tr>`;

    // Headers par boss
    bossList.forEach((bid, bi) => {
      const bdisp = sectionData[bid].boss_display;
      const colW  = cols.reduce((s,c) => s + (c.w||90), 0) + 20;
      const borderR = bi < bossList.length-1 ? 'border-right:3px solid var(--bg)' : '';

    // Sous-headers colonnes
    bossList.forEach((bid, bi) => {
      const borderR = bi < bossList.length-1;
      cols.forEach((c, ci) => {
        const last = ci === cols.length-1;
        const br = last && borderR ? 'border-right:3px solid var(--bg)' : '';

      });

    t += '</tr>';

    // Lignes
    const maxRows = Math.max(...bossList.map(bid => Math.min((sectionData[bid].entries||[]).length, limit)));

      const rowBg = i%2===0 ? 'var(--surface)' : 'var(--surface2)';
      t += `<tr style="background:${rowBg}">`;
      bossList.forEach((bid, bi) => {
        const entry = (sectionData[bid].entries||[])[i];

        cols.forEach((c, ci) => {
          const last = ci === cols.length-1;
          const br = last && borderR ? 'border-right:3px solid var(--bg)' : '';

    // Ligne médiane
    t += `<tr style="background:var(--surface2);border-top:2px solid var(--border)">`;
    bossList.forEach((bid, bi) => {
      const entries = sectionData[bid].entries || [];
      const borderR = bi < bossList.length-1;
      cols.forEach((c, ci) => {
        const last = ci === cols.length-1;
        const br = last && borderR ? 'border-right:3px solid var(--bg)' : '';

          const vals = entries.map(e => c.medianVal(e)).filter(v=>v>0);
          const med  = median(vals);
          t += `<td style="${style}">${ci===0?'Median:':''}</td>`;
          if (ci===0) { /* label already added */ }
          // Actually handle per-col:
        } else {
          t += `<td style="${style}"></td>`;
        }
      });
    });
    // Refaire la ligne médiane proprement
    t = t.replace(/<tr style="background:var\(--surface2\);border-top:2px solid var\(--border\)">[\s\S]*$/, '');
    t += `<tr style="background:var(--surface2);border-top:2px solid var(--border)">`;
    bossList.forEach((bid, bi) => {
      const entries = sectionData[bid].entries || [];
      const borderR = bi < bossList.length-1;
      cols.forEach((c, ci) => {
        const last = ci === cols.length-1;
        const br = last && borderR ? 'border-right:3px solid var(--bg)' : '';
        let cell = '';
        if (ci === 0) {
          cell = '<b>Median:</b>';
        } else if (c.medianVal && entries.length) {
          const vals = entries.map(e => c.medianVal(e)).filter(v=>v>0);
          cell = vals.length ? c.fmtMedian(median(vals)) : '';
        }
        t += `<td style="font-size:11px;padding:4px 6px;color:var(--muted);${br}">${cell}</td>`;

    t += '</tr></table></div>';

  // ── 1. Fastest Kills ──

        medianVal: e=>e.raid_st_dps, fmtMedian: v=>Math.round(v).toLocaleString('en-US') },

  // ── 2. Record Kill Raid Comps ──
  {

    if (bossList.length) {

      bossList.forEach(bid => {

  // ── 3. Top DPS Overall ──
  html += ovTable(
    DATA.top_dps_overall, [
      { label:'Date',  w:72,  muted:true, get: e => e.date },
      { label:'Top15', w:120, get: e => `<span style="color:${classColor(e.class)};font-weight:600">${e.name}</span>` },
      { label:'ST DPS',w:95,  align:'right', bold:true, get: e => Math.round(e.dps).toLocaleString('en-US'),
        medianVal: e=>e.dps, fmtMedian: v=>Math.round(v).toLocaleString('en-US') },
      { label:'Time',  w:48,  align:'right', muted:true, get: e => fmtDur(e.dur) },
    ], 'Top DPS Overall', '🎯', 15
  );

  // ── 4. Top Support DPS ──
  html += ovTable(
    DATA.top_support_dps, [
      { label:'Date',    w:72,  muted:true, get: e => e.date },
      { label:'Support', w:120, get: e => `<span style="color:${classColor(e.class)};font-weight:600">${e.name}</span>` },
      { label:'ST DPS',  w:95,  align:'right', bold:true, get: e => Math.round(e.dps).toLocaleString('en-US'),
        medianVal: e=>e.dps, fmtMedian: v=>Math.round(v).toLocaleString('en-US') },
      { label:'Time',    w:48,  align:'right', muted:true, get: e => fmtDur(e.dur) },

  // ── 5. Top Tank DPS ──

      { label:'ST DPS',w:95, align:'right', bold:true, get: e => Math.round(e.dps).toLocaleString('en-US'),

function buildRaids() {
  const el = document.getElementById('tab-raids');
  let html = `<div class="filter-row">
    <input type="text" id="raid-search" placeholder="Rechercher (raid, date, log…)" oninput="filterRaids()">
    <select id="raid-label-filter" onchange="filterRaids()">
      <option value="">Tous les raids</option>`;
  const labels = [...new Set(DATA.raids.map(r=>r.raid_label))].sort();
  labels.forEach(l => html += `<option>${l}</option>`);
  html += `</select></div><div id="raids-list">`;

  DATA.raids.forEach(raid => {
    const bks = DATA.boss_kills.filter(bk=>bk.raid_id===raid.id);
    const bossCount = bks.length;
    html += `<details data-raid-id="${raid.id}" data-date="${raid.date}"
               data-label="${raid.raid_label}" data-log="${raid.log_file||''}">
      <summary>
        <span>${raid.date}</span>
        ${tag(raid.raid_label,'tag-raid')}
        <span class="dur">${bossCount} boss · ${raid.guild}</span>
        <span class="dur" style="margin-left:auto;font-size:11px">${raid.log_file||''}</span>
      </summary>
      <div class="detail-body">`;

    bks.forEach(bk => {
      const drs = (DR_BY_BK[bk.id] || []);
      const mx = drs[0]?.dps || 1;
      html += `<div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          ${tag(bk.boss_display,'tag-boss')}
          <span class="dur">Durée: ${fmtDur(bk.duration_sec)}</span>
          <span class="dur">· ${bk.player_count} joueurs</span>
        </div>
        <div class="scroll-x"><table>
          <tr><th>#</th><th>Player</th><th>Classe</th><th style="min-width:220px">DPS</th><th>Dmg Total</th></tr>`;
      drs.forEach((dr,i) => {
        html += `<tr>
          <td class="${rankCls(i+1)}">${i+1}</td>
          <td><b>${dr.player_name}</b></td>
          <td>${tag(dr.player_class,'tag-class')}</td>
          <td>${dpsBar(dr.dps, mx)}</td>
          <td class="dur">${fmtDmg(dr.total_dmg)}</td>
        </tr>`;
      });
      html += `</table></div></div>`;
    });

  });
  html += `</div>`;
  el.innerHTML = html;
}

function filterRaids() {
  const q     = document.getElementById('raid-search').value.toLowerCase();
  const label = document.getElementById('raid-label-filter').value;
  document.querySelectorAll('#raids-list details').forEach(d => {
    const date  = d.dataset.date || '';
    const lbl   = d.dataset.label || '';
    const log   = d.dataset.log || '';
    const match = (!q || date.includes(q) || lbl.toLowerCase().includes(q) || log.toLowerCase().includes(q))
               && (!label || lbl === label);
    d.style.display = match ? '' : 'none';
  });
}

// Style PrancingTurtle : colonnes parallèles par classe, top 100 par boss

let lbMode = 'current'; // 'current' | 'legacy' | 'best'

function buildLeaderboard() {
  const el = document.getElementById('tab-leaderboard');

  const raidBoss = DATA.raid_boss_structure || {};
  const raids    = Object.keys(raidBoss);

    const active = i === 0 ? 'background:var(--accent);color:#111;' : 'background:var(--surface2);color:var(--muted);';

      <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:6px">Source :</span>
      <button onclick="setLbMode('current',this)" id="lb-mode-current"

        Current
      </button>
      <button onclick="setLbMode('legacy',this)" id="lb-mode-legacy"

        Legacy
      </button>
      <button onclick="setLbMode('best',this)" id="lb-mode-best"
        style="background:var(--surface2);color:var(--muted);border:none;padding:4px 14px;border-radius:4px;font-weight:700;font-size:12px;cursor:pointer">
        ⭐ Best
      </button>
    </div>`;
  }

  const bossBtns = `<div id="lb-boss-btns" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap"></div>`;

  // Zone table
  const table = `<div id="lb-table"></div>`;

  el.innerHTML = raidTabs + toggleHtml + bossBtns + table;

  // Sélectionner le 1er raid et son 1er boss par défaut

function setLbMode(mode, btnEl) {
  lbMode = mode;
  ['current','legacy','best'].forEach(m => {
    const b = document.getElementById(`lb-mode-${m}`);
    if (!b) return;
    b.style.background = m === mode ? 'var(--accent)' : 'var(--surface2)';
    b.style.color      = m === mode ? '#111'          : 'var(--muted)';
  });
  // Re-render le boss actuellement sélectionné
  const activeBtn = document.querySelector('[id^="lb-boss-btn-"][style*="var(--accent)"]');
  if (activeBtn) {
    const bossId = activeBtn.id.replace('lb-boss-btn-', '');
    renderLeaderboard(bossId);
  }
}

function selectLbRaid(raid) {
  const raidBoss = DATA.raid_boss_structure || {};

  // Mettre à jour l'aspect des boutons raid
  Object.keys(raidBoss).forEach(r => {
    const btn = document.getElementById(`lb-raid-btn-${r}`);
    if (!btn) return;
    btn.style.background = r === raid ? 'var(--accent)' : 'var(--surface2)';
    btn.style.color      = r === raid ? '#111'          : 'var(--muted)';
  });

  // Cacher le toggle Legacy/Best si on n'est pas sur BOS
  const toggle = document.getElementById('lb-mode-toggle');
  if (toggle) {
    toggle.style.display = raid === 'BOS' ? 'flex' : 'none';
  }
  // Si on quitte BOS, forcer le mode current
  if (raid !== 'BOS' && lbMode !== 'current') {
    lbMode = 'current';
    ['current','legacy','best'].forEach(m => {
      const b = document.getElementById(`lb-mode-${m}`);
      if (b) { b.style.background = m==='current'?'var(--accent)':'var(--surface2)'; b.style.color = m==='current'?'#111':'var(--muted)'; }
    });
  }

  // Remplir les boutons boss
  const bosses  = raidBoss[raid] || [];
  const bossDiv = document.getElementById('lb-boss-btns');
  bossDiv.innerHTML = bosses.map((b, i) =>
    `<button onclick="selectLbBoss('${b.id}', this)" id="lb-boss-btn-${b.id}"
      style="${i === 0 ? 'background:var(--surface);color:var(--text);border:1px solid var(--accent)' : 'background:var(--surface2);color:var(--muted);border:1px solid var(--border)'};
      padding:5px 14px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer">
      ${b.display}
    </button>`
  ).join('');

  // Sélectionner le 1er boss du raid
  if (bosses.length) selectLbBoss(bosses[0].id, document.getElementById(`lb-boss-btn-${bosses[0].id}`));
  else document.getElementById('lb-table').innerHTML = `<div class="empty">No data for this raid.</div>`;
}

function selectLbBoss(bossId, btnEl) {
  // Reset style tous les boutons boss
  document.querySelectorAll('[id^="lb-boss-btn-"]').forEach(b => {
    b.style.background  = 'var(--surface2)';
    b.style.color       = 'var(--muted)';
    b.style.borderColor = 'var(--border)';
  });
  if (btnEl) {
    btnEl.style.background  = 'var(--surface)';
    btnEl.style.color       = 'var(--text)';
    btnEl.style.borderColor = 'var(--accent)';
  }
  renderLeaderboard(bossId);
}

function getLbData(bossId) {
  const current = (DATA.leaderboard || {})[bossId] || {};
  const legacy  = (DATA.leaderboard_legacy || {})[bossId] || {};

  if (lbMode === 'current') return current;
  if (lbMode === 'legacy')  return legacy;

  // mode 'best' : fusion, meilleur score par joueur, tronqué à 100 par classe
  const merged = {};
  const allClasses = new Set([...Object.keys(current), ...Object.keys(legacy)]);
  allClasses.forEach(cls => {
    const map = {};
    // On parcourt current puis legacy, on garde le meilleur DPS par nom
    [...(current[cls] || []), ...(legacy[cls] || [])].forEach(row => {
      if (!map[row.name] || row.dps > map[row.name].dps) {
        map[row.name] = row;
      }
    });
    merged[cls] = Object.values(map)
      .sort((a, b) => b.dps - a.dps)
      .slice(0, 100);
  });
  return merged;
}

function renderLeaderboard(boss) {
  if (!boss) return;
  const lb = getLbData(boss);

  const presentClasses = CLASS_ORDER.filter(c => lb[c] && lb[c].length > 0);
  const extraClasses   = Object.keys(lb).filter(c => !CLASS_ORDER.includes(c) && lb[c] && lb[c].length > 0);
  const allCols        = [...presentClasses, ...extraClasses];

  if (!allCols.length) {
    document.getElementById('lb-table').innerHTML = `<div class="empty">No data for this boss.</div>`;
    return;
  }

  const maxRows = Math.max(...allCols.map(c => (lb[c] || []).length));

  // ── Header ligne 1 : nom de classe ──
  let thead1 = '<tr>';
  allCols.forEach(cls => {
    const color = CLASS_COLORS[cls] || '#6c8cff';
    thead1 += `<th colspan="5" class="lb-col-header" style="
      text-align:center; background:${color}; color:#111;
      font-size:11px; font-weight:800; padding:5px 4px;
      letter-spacing:.8px; text-transform:uppercase;
      border-right:3px solid var(--bg); border-bottom:none;
    ">${cls}</th>`;
  });
  thead1 += '</tr>';

  // ── Header ligne 2 : sous-colonnes ──
  let thead2 = '<tr>';
  allCols.forEach(cls => {
    const color = CLASS_COLORS[cls] || '#6c8cff';
    const thBase = `background:${color}22; color:${color}; font-size:10px; font-weight:700; text-transform:uppercase; padding:4px 5px; letter-spacing:.4px; border-bottom:2px solid ${color};`;
    thead2 += `<th class="lb-col-rank" style="${thBase} border-right:1px solid var(--bg); text-align:right">#</th>`;
    thead2 += `<th class="lb-col-date" style="${thBase} border-right:1px solid var(--bg)">Date</th>`;
    thead2 += `<th class="lb-col-name" style="${thBase}">Player</th>`;
    thead2 += `<th class="lb-col-dps"  style="${thBase} border-right:1px solid var(--bg); text-align:right">DPS</th>`;
    thead2 += `<th class="lb-col-dur"  style="${thBase} border-right:3px solid var(--bg); text-align:right">Time</th>`;
  });
  thead2 += '</tr>';

  // ── Lignes de données ──
  let rows = '';
  for (let i = 0; i < maxRows; i++) {
    const rowBg = i % 2 === 0 ? 'var(--surface)' : 'var(--surface2)';
    rows += `<tr style="background:${rowBg}">`;
    allCols.forEach((cls, ci) => {
      const row   = (lb[cls] || [])[i];
      const color = CLASS_COLORS[cls] || '#6c8cff';
      const sepR  = `border-right:3px solid var(--bg)`;
      const innerR = `border-right:1px solid rgba(46,52,80,.6)`;
      const rankColor = i === 0 ? '#ffd166' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : 'var(--text)';
      const fw = i < 3 ? '700' : '400';
      const baseCell = `font-size:11px; padding:3px 5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;`;
      if (row) {
        const isLegacy  = row.legacy === true;
        // Badge PT sur la date si entrée legacy
        const cleanLabel = row.zip_file
          ? row.zip_file.replace(/^Original\//, '').replace(/\.zip$/, '')
          : '';
        const dateTxt   = isLegacy
          ? `<span title="Legacy record" style="color:#888;font-size:9px;margin-right:2px">PT</span>${row.date}`
          : (row.zip_file
              ? `<span title="${cleanLabel}" style="color:inherit;text-decoration:underline dotted">${row.date}</span>`
              : row.date);
        // Couleur nom légèrement atténuée si legacy
        // En mode Best : rouge si Current, gris atténué si Legacy
        const isBestMode = lbMode === 'best';
        const nameColor = isBestMode
          ? (isLegacy ? 'var(--muted)' : '#ef476f')
          : (isLegacy ? 'var(--muted)' : 'var(--text)');
        rows += `<td class="lb-col-rank" style="${baseCell} text-align:right; color:${rankColor}; font-weight:${fw}; border-right:1px solid rgba(46,52,80,.6)">${i+1}</td>`;
        rows += `<td class="lb-col-date" style="${baseCell} color:var(--muted); ${innerR}">${dateTxt}</td>`;
        rows += `<td class="lb-col-name" style="${baseCell} color:${nameColor}; font-weight:${fw}">${row.name}</td>`;
        rows += `<td class="lb-col-dps"  style="${baseCell} text-align:right; font-weight:600; color:var(--text); font-family:'Consolas','Courier New',monospace; ${innerR}">${fmtNum(row.dps)}</td>`;
        rows += `<td class="lb-col-dur"  style="${baseCell} text-align:right; color:var(--muted); ${sepR}">${fmtDur(row.duration_sec)}</td>`;
      } else {
        rows += `<td colspan="5" style="${sepR}"></td>`;
      }
    });
    rows += '</tr>';
  }

  const html = `<div class="scroll-x">
    <table class="lb-table">
      <thead>${thead1}${thead2}</thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
  document.getElementById('lb-table').innerHTML = html;
}
// ── Players ────────────────────────────────────────────────────────────────
function buildPlayers() {
  const el = document.getElementById('tab-players');
  let html = `<div class="filter-row">
    <input type="text" id="player-search" placeholder="Rechercher un joueur…" oninput="filterPlayers()">
    <select id="player-class-filter" onchange="filterPlayers()">
      <option value="">Toutes classes</option>`;
  const classes = [...new Set(DATA.players.map(p=>p.class).filter(c=>c&&c!=='?'))].sort();
  classes.forEach(c => html += `<option>${c}</option>`);
  html += `</select></div><div id="players-list">`;

  // Sort players by total kills desc
  const playersSorted = DATA.player_stats.slice().sort((a,b) => {
    const ta = a.bosses.reduce((s,b)=>s+b.kills,0);
    const tb = b.bosses.reduce((s,b)=>s+b.kills,0);
    return tb - ta;
  });

  playersSorted.forEach(p => {
    const totalKills = p.bosses.reduce((s,b)=>s+b.kills,0);
    const bestDps = Math.max(...p.bosses.map(b=>b.max_dps));
    html += `<details data-player-name="${p.name.toLowerCase()}" data-player-class="${p.class}">
      <summary>
        <b>${p.name}</b>
        ${tag(p.class||'?','tag-class')}
        <span class="dur">${totalKills} kills · record ${fmtDps(bestDps)} DPS</span>
      </summary>
      <div class="detail-body">
        <div style="padding:12px 16px"><div class="scroll-x"><table>
          <tr><th>Boss</th><th>Kills</th><th>Meilleur DPS</th><th>DPS Moyen</th></tr>`;
    p.bosses.sort((a,b)=>b.max_dps-a.max_dps).forEach(b => {
      html += `<tr>
        <td>${tag(b.boss_display,'tag-boss')}</td>
        <td class="dur">${b.kills}</td>
        <td><b>${fmtDps(b.max_dps)}</b></td>
        <td class="dur">${fmtDps(b.avg_dps)}</td>
      </tr>`;
    });
    html += `</table></div></div></div></details>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function filterPlayers() {
  const q   = document.getElementById('player-search').value.toLowerCase();
  const cls = document.getElementById('player-class-filter').value;
  document.querySelectorAll('#players-list details').forEach(d => {
    const name = d.dataset.playerName || '';
    const pcls = d.dataset.playerClass || '';
    const ok = (!q || name.includes(q)) && (!cls || pcls===cls);
    d.style.display = ok ? '' : 'none';
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
document.getElementById('gen-date').textContent = DATA.generated_at;
document.getElementById('header-badge').textContent =
  `${DATA.raids.length} raids · ${DATA.players.length} joueurs`;

buildOverview();
buildRaids();
buildLeaderboard();
buildPlayers();
</script>
